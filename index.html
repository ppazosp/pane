<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minmark</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="unsaved-indicator" class="hidden"></div>
      <div id="switcher-overlay" class="hidden">
        <div id="switcher-row"></div>
      </div>
      <div id="editor-container"></div>
      <textarea id="source-editor" class="hidden" spellcheck="false"></textarea>
      <div id="editor-empty">
        <span>Open a file with <kbd>&#8984;P</kbd></span>
      </div>
    </div>
    <div id="quickopen-overlay" class="hidden">
      <div id="quickopen-modal">
        <input id="quickopen-input" type="text" placeholder="Open file..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-form-type="other" />
        <ul id="quickopen-list"></ul>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
